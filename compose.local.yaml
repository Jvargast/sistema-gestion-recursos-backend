name: aguasvalentino-local

services:
  db:
    image: postgres:16-alpine
    container_name: aguasvalentino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-db_sistema_erp_v3}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: America/Santiago
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - aguasvalentino_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-db_sistema_erp_v3}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: aguasvalentino-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aguasvalentino.cl
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5051:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  aguasvalentino_postgres_data:
