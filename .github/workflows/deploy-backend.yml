name: Deploy Backend to EC2

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t aguasvalentino-backend:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -eu

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              else
                docker-compose "$@"
              fi
            }

            cd ${{ secrets.PROJECT_PATH }}

            if [ -f docker-compose.yml ] && ! git ls-files --error-unmatch docker-compose.yml >/dev/null 2>&1; then
              echo ">>> backup untracked docker-compose.yml..."
              cp docker-compose.yml "docker-compose.yml.backup-$(date +%Y%m%d%H%M%S)"
              rm docker-compose.yml
            fi

            echo ">>> fetch repository..."
            git fetch origin master
            git reset --hard ${{ github.sha }}

            echo ">>> build backend..."
            compose build --pull backend

            echo ">>> deploy backend..."
            compose up -d --no-deps backend

            echo ">>> container status:"
            compose ps

            echo ">>> cleanup unused docker layers..."
            docker image prune -f
