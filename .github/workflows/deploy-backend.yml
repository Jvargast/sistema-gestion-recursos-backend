name: Deploy Backend to EC2

on:
  push:
    branches: [ "master" ]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "compose.yaml"
      - "docker-compose.yml"
      - ".github/workflows/deploy-backend.yml"

  workflow_dispatch:
    inputs:
      release_type:
        description: "Tipo de versionamiento para este lanzamiento"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present
        env:
          NODE_ENV: test
          CI: true

      - name: Build app
        run: npm run build --if-present

      - name: Build Docker image
        run: docker build -t aguasvalentino-backend:${{ github.sha }} .

  release:
    runs-on: ubuntu-latest
    needs: validate

    permissions:
      contents: write

    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        env:
          RELEASE_TYPE_INPUT: ${{ inputs.release_type || 'patch' }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"

          if [ -z "$latest_tag" ]; then
            current_version="0.0.0"
          else
            current_version="${latest_tag#v}"
          fi

          IFS='.' read -r major minor patch <<< "$current_version"

          case "$RELEASE_TYPE_INPUT" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Invalid release type: $RELEASE_TYPE_INPUT"
              exit 1
              ;;
          esac

          release_version="${major}.${minor}.${patch}"
          release_tag="v${release_version}"

          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists."
            exit 1
          fi

          git tag -a "$RELEASE_TAG" "$GITHUB_SHA" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - validate
      - release

    steps:
      - name: Deploy over SSH to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                echo "Docker Compose is required."
                exit 1
              fi
            }

            export BACKEND_VERSION="${{ needs.release.outputs.release_tag }}"
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1

            cd "${{ secrets.PROJECT_PATH }}"

            echo ">>> docker version:"
            docker version

            echo ">>> docker compose version:"
            compose version

            echo ">>> docker buildx version:"
            if ! docker buildx version >/dev/null 2>&1; then
              echo "Docker Buildx is required because BuildKit is enabled."
              echo "Install docker-buildx-plugin on the EC2 instance."
              exit 1
            fi
            docker buildx version

            echo ">>> docker buildx builder:"
            docker buildx inspect >/dev/null 2>&1 || docker buildx create --use
            docker buildx inspect --bootstrap

            echo ">>> saving current backend image for rollback..."
            previous_image="$(docker inspect --format='{{.Config.Image}}' aguasvalentino-backend 2>/dev/null || true)"
            previous_version=""

            if [ -n "$previous_image" ] && echo "$previous_image" | grep -q ':'; then
              previous_version="${previous_image##*:}"
            fi

            echo ">>> fetch repository..."
            git fetch origin master --tags
            git reset --hard "${{ github.sha }}"

            echo ">>> docker disk usage before deploy:"
            docker system df

            echo ">>> build backend ${BACKEND_VERSION}..."
            compose build --pull backend

            echo ">>> deploy backend ${BACKEND_VERSION}..."
            compose up -d --no-deps backend

            echo ">>> waiting backend healthcheck..."
            attempt=0
            health_status="starting"

            while [ "$attempt" -lt 30 ]; do
              health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' aguasvalentino-backend 2>/dev/null || echo missing)"
              echo "health=${health_status}"

              if [ "$health_status" = "healthy" ]; then
                break
              fi

              attempt=$((attempt + 1))
              sleep 5
            done

            if [ "$health_status" != "healthy" ]; then
              echo "Backend did not become healthy."
              docker logs --tail 120 aguasvalentino-backend || true

              if [ -n "$previous_version" ]; then
                echo ">>> rollback to previous version: $previous_version"

                export BACKEND_VERSION="$previous_version"
                compose up -d --no-deps backend

                echo ">>> waiting rollback healthcheck..."
                rollback_attempt=0
                rollback_health="starting"

                while [ "$rollback_attempt" -lt 30 ]; do
                  rollback_health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' aguasvalentino-backend 2>/dev/null || echo missing)"
                  echo "rollback_health=${rollback_health}"

                  if [ "$rollback_health" = "healthy" ]; then
                    break
                  fi

                  rollback_attempt=$((rollback_attempt + 1))
                  sleep 5
                done

                if [ "$rollback_health" != "healthy" ]; then
                  echo "Rollback did not become healthy."
                  docker logs --tail 120 aguasvalentino-backend || true
                else
                  echo "Rollback executed successfully."
                fi
              else
                echo "No previous version available for rollback."
              fi

              exit 1
            fi

            echo ">>> container status:"
            compose ps

            echo ">>> cleanup stopped containers..."
            docker container prune -f --filter "until=24h"

            echo ">>> cleanup unused docker images..."
            docker image prune -f

            echo ">>> docker disk usage after cleanup:"
            docker system df
