services:
  backend:
    build: .
    container_name: aguasvalentino-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      TZ: America/Santiago
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 8080) + '/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge
